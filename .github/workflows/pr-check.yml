name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  changeset-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Check for changeset
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^lexicons/\|^types/\|^package.json"; then
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^\.changeset/.*\.md$"; then
              echo "Changeset found"
            else
              echo "::warning::No changeset found. Run 'npm run changeset' if this PR includes user-facing changes."
            fi
          else
            echo "No package changes detected"
          fi
      - name: Check prerelease mode
        run: |
          if [ -f .changeset/pre.json ]; then
            mode=$(node -e "console.log(require('./.changeset/pre.json').mode)")
            if [ "$mode" = "pre" ]; then
              echo "::error::Active prerelease mode must be exited before merging to main."
              echo "Run 'npx changeset pre exit' on the prerelease branch and commit the change."
              exit 1
            fi
            echo "Prerelease mode is not active (mode=$mode)"
          else
            echo "No prerelease mode detected"
          fi
